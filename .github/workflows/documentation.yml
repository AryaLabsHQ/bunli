name: Documentation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "packages/*/src/**"
      - "packages/*/package.json"
  schedule:
    - cron: "0 9 * * 3" # Every Wednesday at 9am UTC
  workflow_dispatch: # Manual trigger
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: docs-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  docs-audit-pr:
    if: >-
      github.event_name == 'pull_request' &&
      contains(fromJSON('["MEMBER", "OWNER"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@v1.3.5
        with:
          model: minimax/MiniMax-M2.7
          agent: documentation
          use_github_token: "true"
          prompt: "Audit docs affected by this PR's code changes. Implementation is the source of truth — update documentation to match code, never modify implementation. Commit doc fixes directly to this PR branch."
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          OPENCODE_CONFIG: .github/opencode.jsonc

  docs-sync:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@v1.3.5
        with:
          model: minimax/MiniMax-M2.7
          agent: documentation
          use_github_token: "true"
          prompt: |
            Run a full documentation audit against the main branch.
            Implementation is the source of truth — only update docs, never code.
            If you find issues, create a new branch and open a PR with the fixes.
            Title the PR using conventional commit format (e.g., "docs: update plugin lifecycle hooks" or "docs(api): add missing handler context properties"). Be specific about what changed.
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          OPENCODE_CONFIG: .github/opencode.jsonc

  docs-on-demand:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode') ||
        contains(github.event.comment.body, ' /docs') ||
        startsWith(github.event.comment.body, '/docs')
      ) &&
      contains(fromJson('["OWNER","MEMBER"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@v1.3.5
        with:
          model: minimax/MiniMax-M2.7
          agent: documentation
          use_github_token: "true"
          mentions: "/oc,/opencode,/docs"
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          OPENCODE_CONFIG: .github/opencode.jsonc
